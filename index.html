<title>خريطة العالم التفاعلية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a1628;--ocean:#0d1e3a;--card:rgba(4,10,28,0.97);
  --border:rgba(100,160,255,0.22);--text:#e8f0ff;--sub:#6a8cb0;
  --accent:#a8c8e8;--gold:#e8a030;--font:'Cairo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font)}

/* ── header ── */
#header{
  position:fixed;top:0;left:0;right:0;z-index:50;height:48px;
  background:rgba(6,14,34,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 14px;
}
#header h1{font-size:15px;font-weight:700;color:var(--text)}
#counter{font-size:11px;color:var(--gold);background:rgba(232,160,48,.12);border:1px solid rgba(232,160,48,.28);border-radius:20px;padding:3px 10px;white-space:nowrap}

/* ── subheader ── */
#subheader{
  position:fixed;top:48px;left:0;right:0;z-index:49;height:38px;
  background:rgba(6,14,34,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(100,160,255,.1);
  display:flex;align-items:center;justify-content:center;gap:8px;padding:0 12px;
}
.pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);border:1px solid rgba(100,160,255,.15);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600;color:var(--accent);white-space:nowrap}
.pill .icon{font-size:13px}

/* ── map ── */
#mc{
  position:fixed;top:86px;left:0;right:0;bottom:50px;
  overflow:hidden;touch-action:manipulation;cursor:grab;background:var(--bg);
}
#mc.dragging{cursor:grabbing}
#ms{width:100%;height:100%;display:block}
.cp{
  stroke:#1a2a4a;stroke-width:.4px;cursor:pointer;
  vector-effect:non-scaling-stroke;          /* تحسين #8 */
  transition:filter .12s;
}
.cp:hover{filter:brightness(1.6) saturate(1.3);stroke:#fff}
.cp.active{stroke:#fff;stroke-width:1.5px;filter:brightness(1.7)}
.sm-dot{cursor:pointer;vector-effect:non-scaling-stroke}

/* ── tooltip ── */
#tt{
  position:fixed;pointer-events:none;background:var(--card);
  border:1px solid var(--border);border-radius:14px;padding:14px 16px;
  min-width:190px;max-width:220px;display:none;z-index:200;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
#tt.vis{display:block}
.tt-img{width:72px;height:48px;object-fit:cover;border-radius:6px;border:1px solid rgba(255,255,255,.14);display:block;margin:0 auto 10px}
.tt-err{font-size:36px;text-align:center;display:block;margin:0 auto 8px;line-height:1}
.tt-sep{width:100%;height:.5px;background:rgba(100,150,220,.18);margin:8px 0}
.tt-ar{font-size:13px;font-weight:700;color:var(--text);text-align:center;direction:rtl}
.tt-en{font-size:11px;color:var(--sub);text-align:center}
.tt-lbl{font-size:9.5px;color:#4a6a90;text-transform:uppercase;letter-spacing:.07em;text-align:center;margin-top:8px}
.tt-cap-ar{font-size:12px;color:var(--accent);text-align:center;direction:rtl;font-weight:600}
.tt-cap-en{font-size:11px;color:#5a7a9a;text-align:center}

/* ── zoom btns ── */
#zbtns{position:fixed;bottom:60px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:40}
.zbtn{
  width:36px;height:36px;background:rgba(8,18,44,.9);border:1px solid var(--border);
  border-radius:9px;color:var(--accent);font-size:17px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  transition:background .15s,transform .1s;box-shadow:0 2px 10px rgba(0,0,0,.4);
}
.zbtn:hover,.zbtn:active{background:rgba(30,60,120,.9);transform:scale(.95)}
#zbtn-eu{font-size:10px;font-weight:700;color:var(--gold)}

/* ── footer ── */
#footer{
  position:fixed;bottom:0;left:0;right:0;height:50px;z-index:50;
  background:rgba(6,14,34,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;
}
#hint{font-size:10px;color:rgba(120,160,210,.5);direction:rtl}
#zinfo{font-size:11px;color:rgba(100,140,200,.5);font-weight:600}

/* ── legend ── */
#legend{
  position:fixed;top:96px;right:12px;
  background:rgba(6,14,34,.88);border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;z-index:40;
  display:flex;align-items:center;gap:6px;
}
#legend span{font-size:10px;color:rgba(200,175,90,.75)}

/* ── loader ── */
#loader{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
#loader.gone{display:none}
.spin{width:40px;height:40px;border:3px solid rgba(100,160,255,.15);border-top-color:rgba(100,160,255,.7);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader p{font-size:13px;color:var(--sub)}
#loader .sub{font-size:11px;color:rgba(100,140,200,.45)}

/* ── mobile tweaks ── */
@media(max-width:520px){
  /* تحسين #9 */
  #tt{
    left:50%!important;top:auto!important;
    bottom:calc(env(safe-area-inset-bottom) + 70px)!important;
    transform:translateX(-50%);
    min-width:260px;max-width:90vw;
  }
  #header h1{font-size:13px}
  .pill{font-size:11px;padding:2px 8px}
}
</style>
</head>

function flagURL(iso){ return `https://flagcdn.com/w80/${iso.toLowerCase()}.png`; }

// ── دمج بيانات API مع الـ fallback ──
let CD = {}; // سيُملأ بعد جلب API أو من FALLBACK

function buildFromFallback(){
  CD = {};
  for(const [id,v] of Object.entries(FALLBACK)){
    CD[id] = {ar:v.ar, en:v.en, cap:v.cap, capa:v.capa||v.cap, iso:v.iso};
  }
}

// محاولة REST Countries API مع timeout — تحسين #7 و #10
async function loadCountriesAPI(){
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), 8000);
  try{
    document.getElementById("load-status").textContent = "جلب بيانات API…";
    const res = await fetch(
      "https://restcountries.com/v3.1/all?fields=cca3,name,capital,translations,flags,cca2",
      {signal: ctrl.signal}
    );
    clearTimeout(tid);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    CD = {};
    // نحوّل cca3 → رقم ISO 3166-1 numeric عبر FALLBACK كـ lookup
    const isoToNum = {};
    for(const [num,v] of Object.entries(FALLBACK)) isoToNum[v.iso.toUpperCase()] = num;

    for(const c of data){
      const alpha2 = c.cca2?.toLowerCase();
      const num = isoToNum[c.cca2] || null;
      const arName = c.translations?.ara?.common || c.name?.common || "";
      const enName = c.name?.common || "";
      const cap = (c.capital||[])[0] || "";
      // احتفظ بالعربي من FALLBACK أولاً إذا موجود
      const fallNum = num ? FALLBACK[num] : null;
      if(num){
        CD[num] = {
          ar: fallNum?.ar || arName,
          en: enName,
          cap: cap,
          capa: fallNum?.capa || cap,
          iso: alpha2 || (fallNum?.iso||"")
        };
      }
    }
    // أضف أي دول في FALLBACK غير موجودة في API
    for(const [id,v] of Object.entries(FALLBACK)){
      if(!CD[id]) CD[id] = {ar:v.ar,en:v.en,cap:v.cap,capa:v.capa||v.cap,iso:v.iso};
    }
    document.getElementById("load-status").textContent = "";
  } catch(e){
    clearTimeout(tid);
    console.warn("API failed, using fallback:", e.message);
    buildFromFallback();
    document.getElementById("load-status").textContent = "";
  }
}

function zoomEU(){
  const ex0=425,ey0=58,ex1=715,ey1=305,bW=ex1-ex0,bH=ey1-ey0;
  const sW=svgEl.clientWidth||window.innerWidth;
  const sH=svgEl.clientHeight||(window.innerHeight-136);
  const s=Math.min(12,.88/Math.max(bW/sW*(sW/960),bH/sH*(sH/500)));
  const cx=(ex0+bW/2)/960*sW, cy=(ey0+bH/2)/500*sH;
  svg.transition().duration(700).call(zoom.transform,d3.zoomIdentity.translate(sW/2-s*cx,sH/2-s*cy).scale(s));
}

   .on("mouseup",()=>mcEl.classList.remove("dragging"));

let tMoved=false, tX=0, tY=0;
mcEl.addEventListener("touchstart",e=>{tMoved=false;tX=e.touches[0].clientX;tY=e.touches[0].clientY;},{passive:true});
mcEl.addEventListener("touchmove",e=>{if(Math.abs(e.touches[0].clientX-tX)>8||Math.abs(e.touches[0].clientY-tY)>8)tMoved=true;},{passive:true});

// ── تحميل الخريطة الجغرافية ──
async function initMap(){
  // تشغيل API و TopoJSON بالتوازي
  const ctrl2 = new AbortController();
  const tid2 = setTimeout(()=>ctrl2.abort(), 10000);
  const [_, world] = await Promise.all([
    loadCountriesAPI(),
    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json",{signal:ctrl2.signal}).then(r=>r.json())
  ]);
  clearTimeout(tid2);

  const countries = topojson.feature(world, world.objects.countries);

  // تحسين #2 — لون ثابت حسب رقم الدولة
  const cmap = {};
  countries.features.forEach(f=>{ cmap[f.id] = COLORS[Number(f.id)%COLORS.length]; });

  const known = countries.features.filter(f=>CD[String(f.id).padStart(3,"0")]).length + SMALL.length;
  document.getElementById("counter").textContent = known + " دولة";

  gMap.append("rect").attr("width",960).attr("height",500).attr("fill","#0d1e3a");

  // تحسين #4 — mouseenter بدل mousemove
  gMap.selectAll(".cp")
    .data(countries.features).enter().append("path")
    .attr("class","cp").attr("d",geoPath).attr("fill",d=>cmap[d.id])
    .on("mouseenter", function(ev,d){         // تحسين #4
      if(isTouch) return;
      const id = String(d.id).padStart(3,"0");
      const info = CD[id]; if(!info){ hideTT(0); return; }
      const rc = this.getBoundingClientRect();
      showTT(rc.left+rc.width/2, rc.top+rc.height/2, info);
    })
    .on("mousemove", function(ev,d){           // لتحديث موضع tooltip عند الحركة داخل الدولة
      if(isTouch||didDrag) return;
      const id = String(d.id).padStart(3,"0");
      if(!CD[id]){ hideTT(0); return; }
      if(!isTouch){
        const W=window.innerWidth,H=window.innerHeight;
        let x=ev.clientX+16, y=ev.clientY-20;
        if(x+230>W) x=ev.clientX-238; if(y+185>H) y=ev.clientY-185; if(y<4) y=4;
        tt.style.left=x+"px"; tt.style.top=y+"px";
      }
    })
    .on("mouseleave", ()=>{ if(!isTouch) hideTT(80); })
    .on("click", function(ev,d){
      if(didDrag) return;
      d3.selectAll(".cp.active").classed("active",false);
      d3.select(this).classed("active",true);
      if(isTouch&&!tMoved){
        const id = String(d.id).padStart(3,"0");
        const info = CD[id]; if(!info) return;
        const rc = this.getBoundingClientRect();
        showTT(rc.left+rc.width/2, rc.top+rc.height/2, info);
        hideTT(3500);
      }
    });

  gMap.append("path")
    .datum(topojson.mesh(world,world.objects.countries,(a,b)=>a!==b))
    .attr("fill","none").attr("stroke","#1a2a4a").attr("stroke-width",.3).attr("d",geoPath);

  // نقاط الدول الصغيرة
  gMap.selectAll(".sm-dot").data(SMALL).enter().append("circle")
    .attr("class","sm-dot")
    .attr("cx", d=>proj([d.lng,d.lat])[0])
    .attr("cy", d=>proj([d.lng,d.lat])[1])
    .attr("r",  d=>d.eu?5:3.5)
    .attr("fill", d=>d.eu?EU_COL:COLORS[SMALL.indexOf(d)%COLORS.length])
    .attr("stroke","#fff").attr("stroke-width",.6)
    // تحسين #4
    .on("mouseenter", (ev,d)=>{ if(!isTouch){ const el=ev.currentTarget,rc=el.getBoundingClientRect(); showTT(rc.left+rc.width/2,rc.top-8,d); }})
    .on("mouseleave", ()=>{ if(!isTouch) hideTT(80); })
    .on("click", (ev,d)=>{
      if(tMoved) return;
      ev.stopPropagation();
      const rc=ev.currentTarget.getBoundingClientRect();
      showTT(rc.left+rc.width/2, rc.top-8, d);
      if(isTouch) hideTT(3500);
    });

  setTimeout(()=>document.getElementById("loader").classList.add("gone"),300);
}

initMap().catch(e=>{
  console.error(e);
  buildFromFallback();
  document.getElementById("loader").innerHTML="<p style='color:#f88'>تعذّر تحميل الخريطة. تحقق من الاتصال.</p>";
});
</script>
</body>
</html>
